name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "21"
  COMPOSE_FILES: "-f docker-compose.yml -f docker-compose.ci.yml"

jobs:
  maven-verify:
    name: Maven verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify all Spring Boot modules
        run: mvn -B -ntp clean verify -f pom.xml -Dtest='!*IntegrationTest'

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          if-no-files-found: ignore

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: maven-verify
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - eureka-server
          - notification-service
          - springboot-security-jwt-rbac-app4
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: harinitech/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: maven-verify
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment
        run: |
          cat > .env <<'EOF'
          DB_USERNAME=root
          DB_PASSWORD=ci_test_password_123
          REDIS_PASSWORD=ci_redis_password_123
          JWT_SECRET=ci-jwt-secret-key-minimum-256-bits-required-for-hs256-algorithm-security
          INTERNAL_API_KEY=ci-internal-api-key-minimum-32-chars-long-value
          SENDGRID_API_KEY=SG.ci-test-fake-key-for-pipeline-only
          SENDGRID_SENDER_MAIL=ci@test.example.com
          SENDGRID_SENDER_NAME=CI Test
          EOF

      - name: Validate Compose configuration
        run: docker compose ${{ env.COMPOSE_FILES }} config --quiet

      - name: Build stack images
        run: docker compose ${{ env.COMPOSE_FILES }} build

      - name: Start stack
        run: docker compose ${{ env.COMPOSE_FILES }} up -d

      - name: Wait for API Gateway health
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8085/actuator/health | grep -q '"status":"UP"'; then
              echo "API Gateway is healthy"
              exit 0
            fi

            echo "Waiting for API Gateway health... ($i/90)"
            docker compose ${{ env.COMPOSE_FILES }} ps
            sleep 10
          done

          echo "API Gateway did not become healthy"
          docker compose ${{ env.COMPOSE_FILES }} ps
          docker compose ${{ env.COMPOSE_FILES }} logs --no-color --tail=250
          exit 1

      - name: Verify Eureka dashboard is reachable
        run: curl -fsS http://localhost:8761/ > /tmp/eureka.html

      - name: Smoke test login through gateway
        run: |
          curl -fsS -X POST http://localhost:8085/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin1@test.com","password":"Password@123"}' \
            | tee /tmp/login-response.json

          grep -Eq '"accessToken"|"token"' /tmp/login-response.json

      - name: Collect Compose diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-diagnostics
          path: |
            /tmp/login-response.json
            /tmp/eureka.html
          if-no-files-found: ignore

      - name: Print logs on failure
        if: failure()
        run: docker compose ${{ env.COMPOSE_FILES }} logs --no-color --tail=300

      - name: Tear down stack
        if: always()
        run: docker compose ${{ env.COMPOSE_FILES }} down -v --remove-orphans
