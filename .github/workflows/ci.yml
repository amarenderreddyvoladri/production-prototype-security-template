name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "21"

jobs:
  build-and-test:
    name: Build & Test (all modules)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verify all modules
        run: mvn -B -ntp clean verify -f pom.xml

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          if-no-files-found: ignore

  docker-build:
    name: Docker image build (smoke)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - eureka-server
          - notification-service
          - springboot-security-jwt-rbac-app4
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: microservices/${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-stack:
    name: Docker Compose stack smoke
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          DB_PASSWORD=ci_test_password_123
          DB_USERNAME=root
          REDIS_PASSWORD=ci_redis_password_123
          JWT_SECRET=ci-jwt-secret-key-minimum-256-bits-required-for-hs256-algorithm-security
          INTERNAL_API_KEY=ci-internal-api-key-minimum-32-chars-long-value
          SENDGRID_API_KEY=SG.ci-test-fake-key-for-pipeline-only
          SENDGRID_SENDER_MAIL=ci@test.example.com
          SENDGRID_SENDER_NAME=CI Test
          EOF

      - name: Build and start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml build
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      - name: Wait for API Gateway health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8085/actuator/health | grep -q '"status":"UP"'; then
              echo "Gateway is healthy"
              exit 0
            fi
            echo "Waiting for gateway... ($i/60)"
            sleep 10
          done
          echo "Gateway did not become healthy"
          docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
          docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --no-color --tail=100
          exit 1

      - name: Smoke test security login via gateway
        run: |
          curl -fsS -X POST http://localhost:8085/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin1@test.com","password":"ChangeMe@123!"}' \
            | tee /tmp/login-response.json
          grep -q 'accessToken' /tmp/login-response.json

      - name: Tear down stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
