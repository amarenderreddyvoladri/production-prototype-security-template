spring.datasource.url=jdbc:h2:mem:notification;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

eureka.client.enabled=false
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false

notification.internal-api-key=test-internal-api-key-minimum-32-chars-long
INTERNAL_API_KEY=test-internal-api-key-minimum-32-chars-long
sendgrid.api.key=SG.ci-test-fake-key-for-pipeline
sendgrid.sender.email=ci@test.example.com
sendgrid.sender.name=CI Test
