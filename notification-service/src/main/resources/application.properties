spring.application.name=notification-service

# ==========================================
# SERVER
# ==========================================
server.port=8182

# ==========================================
# DATABASE
# ==========================================

#spring.datasource.url=${DB_DOCKER_URL}
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIG IMPORT
# ==========================================

spring.config.import=optional:application-secret.properties
spring.cloud.config.enabled=false
spring.docker.compose.enabled=false
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# ==========================================
# JPA
# ==========================================

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# ==========================================
# SWAGGER
# ==========================================

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.show-actuator=false
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

spring.mvc.pathmatch.use-suffix-pattern=false

# ==========================================
# ACTUATOR
# ==========================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# PAGINATION
# ==========================================

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

spring.data.web.pageable.one-indexed-parameters=false

spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size
spring.data.web.sort.sort-parameter=sort

# ==========================================
# EUREKA
# ==========================================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ==========================================
# SENDGRID
# ==========================================

sendgrid.api.key=${SENDGRID_API_KEY}

sendgrid.sender.email=${SENDGRID_SENDER_MAIL}

sendgrid.sender.name=${SENDGRID_SENDER_NAME}

# ==========================================
# INTERNAL SERVICE SECURITY
# ==========================================
# Must match INTERNAL_API_KEY used by security-app (notification.service.internal-api-key).
# Local: set in .env or application-secret.properties | Docker/K8s: inject INTERNAL_API_KEY env var.
notification.internal-api-key=${INTERNAL_API_KEY}

# ==========================================
# LOGGING
# ==========================================

logging.level.com.harinitech.notification_service=DEBUG
