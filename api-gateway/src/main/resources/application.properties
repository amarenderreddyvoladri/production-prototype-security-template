spring.application.name=api-gateway
server.port=8080

# Config Server
spring.cloud.config.uri=${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
spring.config.import=optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Service Discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# =========================
# SECURITY SERVICE ROUTE
# =========================

spring.cloud.gateway.routes[0].id=security-service
spring.cloud.gateway.routes[0].uri=lb://springboot-security-jwt-rbac-app1
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/**

spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=securityServiceCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback

# =========================
# SWAGGER ROUTE
# =========================

spring.cloud.gateway.routes[1].id=security-service-auth
spring.cloud.gateway.routes[1].uri=lb://springboot-security-jwt-rbac-app1
spring.cloud.gateway.routes[1].predicates[0]=Path=/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html

# =========================
# ACTUATOR
# =========================

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always