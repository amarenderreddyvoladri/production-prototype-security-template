services:

  mysql:
    image: mysql:8.4
    container_name: security-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: jwt_security
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: security-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ../notification-service
    container_name: security-notification
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8182:8182"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jwt_security?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_SENDER_MAIL: ${SENDGRID_SENDER_MAIL}
      SENDGRID_SENDER_NAME: ${SENDGRID_SENDER_NAME}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8182/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  app:
    image: security-app:latest
    build:
      context: .
    container_name: security-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      DB_DOCKER_URL: jdbc:mysql://mysql:3306/jwt_security?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_SENDER_MAIL: ${SENDGRID_SENDER_MAIL}
      SENDGRID_SENDER_NAME: ${SENDGRID_SENDER_NAME}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NOTIFICATION_SERVICE_URL: http://notification-service:8182
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

volumes:
  mysql_data:
  redis_data: