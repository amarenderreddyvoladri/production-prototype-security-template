spring.application.name=springboot-security-jwt-rbac-app1

# Database Configuration
server.port=8181
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_security?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

allowed.origins=http://localhost:4200

spring.data.rest.base-path=/api

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# user roles intializer file flag
app.init.users=true

spring.jpa.open-in-view=false

# Custom Properties of my Application only.
security.account.lock-duration-ms=900000
security.account.max-login-attempts=5

jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
# JWT Configuration
jwt.secret=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJKb2huIERvZSIsIm5hbWUiOiJKb2huIERvZSJ9.S2ZfdXl3zH7CTFsRU7p6FgG3csmzxVZDp9Kw8xh9Fik
jwt.expiration=3600000

# Email Configuration
