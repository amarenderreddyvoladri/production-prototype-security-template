spring.application.name=springboot-security-jwt-rbac-app1

# Database Configuration
server.port=8181


#spring.datasource.url=${DB_URL}
spring.datasource.url=${DB_DOCKER_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ✅ FIXED: Made CORS origins configurable via environment variable
allowed.origins=${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8182}
notification.service.internal-api-key=${INTERNAL_API_KEY}

spring.data.rest.base-path=/api

spring.config.import=optional:application-secret.properties

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
spring.jpa.show-sql=false

# user roles intializer file flag
#app.init.users=tru
app.init.users=false

spring.jpa.open-in-view=false

# Custom Properties of my Application only.
security.account.lock-duration-ms=900000
security.account.max-login-attempts=5

jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.sender.email=${SENDGRID_SENDER_MAIL}
sendgrid.sender.name=${SENDGRID_SENDER_NAME}

# SWAGGER Configuration
# ✅ REQUIRED: Enable Swagger UI in Spring Boot 3.x
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ✅ Fix: Swagger needs to see all endpoints including actuator
springdoc.show-actuator=false

# ✅ Fix: Sort endpoints by method for cleaner UI
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ✅ Fix: Disable default Spring Security redirect for /swagger-ui.html
spring.mvc.pathmatch.use-suffix-pattern=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ================================
# GLOBAL PAGINATION CONFIGURATION
# ================================

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size
spring.data.web.sort.sort-parameter=sort

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.data.redis.timeout=2000ms

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=1000ms

security.account.failed-attempt-expiry-minutes=30

# Redis Password
spring.data.redis.password=${REDIS_PASSWORD}

# configuration for microservices communication
# ✅ FIXED: Made Eureka server URL configurable via environment variable
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}