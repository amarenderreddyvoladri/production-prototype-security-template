spring.application.name=springboot-security-jwt-rbac-app1

# Database Configuration
server.port=8181
spring.datasource.url=jdbc:mysql://localhost:3306/jwt_security?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

allowed.origins=http://localhost:4200

spring.data.rest.base-path=/api

spring.config.import=optional:application-secret.properties

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# user roles intializer file flag
app.init.users=true

spring.jpa.open-in-view=false

# Custom Properties of my Application only.
security.account.lock-duration-ms=900000
security.account.max-login-attempts=5

jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.sender.email=${SENDGRID_SENDER_MAIL}
sendgrid.sender.name=${SENDGRID_SENDER_NAME}

# SWAGGER Configuration
# ✅ REQUIRED: Enable Swagger UI in Spring Boot 3.x
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# ✅ Fix: Swagger needs to see all endpoints including actuator
springdoc.show-actuator=false

# ✅ Fix: Sort endpoints by method for cleaner UI
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ✅ Fix: Disable default Spring Security redirect for /swagger-ui.html
spring.mvc.pathmatch.use-suffix-pattern=false

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# ================================
# GLOBAL PAGINATION CONFIGURATION
# ================================

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

spring.data.web.pageable.page-parameter=page
spring.data.web.pageable.size-parameter=size
spring.data.web.sort.sort-parameter=sort