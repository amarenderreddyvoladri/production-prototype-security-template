services:

  # ── INFRASTRUCTURE ────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: ms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: jwt_security
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── LAYER 1: CONFIG SERVER ─────────────────────────────────────
  config-server:
    build:
      context: ./config-server
    container_name: ms-config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── LAYER 2: EUREKA SERVER ─────────────────────────────────────
  eureka-server:
    build:
      context: ./eureka-server
    container_name: ms-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── LAYER 3: SECURITY SERVICE ──────────────────────────────────
  security-service:
    build:
      context: ./springboot-security-jwt-rbac-app4
    container_name: ms-security
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      DB_DOCKER_URL: jdbc:mysql://mysql:3306/jwt_security
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_SENDER_MAIL: ${SENDGRID_SENDER_MAIL}
      SENDGRID_SENDER_NAME: ${SENDGRID_SENDER_NAME}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8181/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── LAYER 4: API GATEWAY ───────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
    container_name: ms-gateway
    restart: unless-stopped
    depends_on:
      eureka-server:
        condition: service_healthy
      security-service:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  mysql_data:
  redis_data: