spring.application.name=config-server
server.port=8888

# =====================================================
# CONFIG SERVER
# =====================================================

# Default for Docker/local reliability
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/config-repo/

# Use this only when you intentionally want Git-backed config:
# spring.cloud.config.server.git.uri=https://github.com/amarenderreddyvoladri/security-config-repository.git
# spring.cloud.config.server.git.clone-on-start=true
# spring.cloud.config.server.git.default-label=main

# =====================================================
# EUREKA CLIENT
# =====================================================

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# =====================================================
# ACTUATOR
# =====================================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.info.env.enabled=false

# =====================================================
# INFO
# =====================================================

info.app.name=Config Server
info.app.description=Centralized Configuration Service
info.app.version=1.0.0

# =====================================================
# LOGGING
# =====================================================

logging.level.root=INFO
logging.level.org.springframework.cloud.config=INFO